session:
  name: "totallicks"
  windows:
    - name: "test django server"
      root: "~/Developer/totallicks"
      filters:
        before:
          - "source ~/Developer/venv/totalliksenv/bin/activate"
          - "python manage.py runserver"
      splits:
        [splits list]
    - name: "develop env"
      root: "~/Developer/totallicks"
      filters:
        before:
          - "source ~/Developer/venv/totalliksenv/bin/activate"
        after: 
          - "echo 'Time for Hack...'"
      splits:
        - cmd: "clear"
          focus: true
          width: 70
        - cmd: "python manage.py test"
          width: 30
