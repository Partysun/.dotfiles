session:
  name: "api"
  windows:
    - name: "server"
      root: "~/Developer/booking/api"
      filters:
        before:
          - "workon bookingapi2"
          - "python manage.py runserver"
      splits:
        [splits list]
    - name: "editor"
      root: "~/Developer/booking/api"
      filters:
        before:
          - "workon bookingapi2"
        after: 
          - "echo 'Time for Hack...'"
      splits:
        - cmd: "clear"
          focus: true
          width: 70
        - cmd: "nosetests"
          width: 30
