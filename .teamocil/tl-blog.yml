session:
  name: "Totallicks blog"
  windows:
    - name: "jekyll server activated"
      root: "~/Developer/totallicks-blog"
      filters:
        before:
          - "jekyll --auto --server"
      splits:
        [splits list]
    - name: "develop "
      root: "~/Developer/totallicks-blog"
      filters:
        before: 
          - "echo 'Time for Hack...'"
      splits:
        [splits list]
